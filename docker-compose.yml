version: '3.8'

services:
  app:
    image: ghcr.io/${GITHUB_USERNAME:-David-9700}/springboot-paper-topic:latest
    container_name: springboot-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=mysql
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD:-123456}
    depends_on:
      - mysql
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - ./logs:/app/logs
  
  mysql:
    image: mysql:8.0
    container_name: springboot-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: springboot3wd7d5i4
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    restart: unless-stopped
    networks:
      - app-network
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  mysql-data:

networks:
  app-network:
    driver: bridge
